services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MONGODB_URI=mongodb://mongo:27017/creaive
      - ADMIN_SECRET=${ADMIN_SECRET}
      - PERSIST_DIR=/app/persistent
    depends_on:
      mongo:
        condition: service_started
    volumes:
      - popup-data:/app/persistent
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
  popup-data:
