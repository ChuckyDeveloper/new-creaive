      #       if nc -z -w5 "$HOST" "$PORT"; then ok=1; break; fi
      #       echo "Attempt $n failed; retrying..."; n=$((n+1)); sleep 3
      #     done
      #     [ "$ok" = "1" ] || { echo "Cannot reach $HOST:$PORT"; exit 1; }

      - name: SSH smoke test (key)
        if: ${{ env.HAS_SSH_KEY == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            echo "[remote] whoami=$(whoami)"
            echo "[remote] uname=$(uname -a)"
            echo "[remote] pwd=$(pwd)"

      - name: Deploy (key) git pull && npm i && build && pm2 restart
        if: ${{ env.HAS_SSH_KEY == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ env.APP_DIR }}
          BRANCH: ${{ env.BRANCH }}
          REPO_SSH_URL: ${{ env.REPO_SSH_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          envs: APP_DIR,BRANCH,REPO_SSH_URL
          script: |
            set -euo pipefail
            echo "[remote] whoami=$(whoami)"
            echo "[remote] pwd(before)=$(pwd)"
            echo "[remote] APP_DIR=${APP_DIR:-<empty>}"
            echo "[remote] BRANCH=${BRANCH:-<empty>}"
            echo "[remote] REPO_SSH_URL=${REPO_SSH_URL:-<empty>}"
            test -n "${APP_DIR:-}" || { echo "APP_DIR is empty. Aborting."; exit 1; }

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            echo "[remote] pwd(after)=$(pwd)"

            git config --global --add safe.directory "$APP_DIR" || true
            if [ ! -d .git ]; then
              git init
              git remote add origin "$REPO_SSH_URL"
            fi
            git remote set-url origin "$REPO_SSH_URL" || true
            git fetch --all --prune
            git checkout -B "$BRANCH" || git checkout "$BRANCH" || true

            git reset --hard "origin/${BRANCH}"

            echo "[remote] Checking Node/npm/pm2 availability"
            if ! command -v npm >/dev/null 2>&1 || ! command -v node >/dev/null 2>&1; then
              echo "[remote] npm/node not found. Installing via nvm..."
              export NVM_DIR="$HOME/.nvm"
              if [ ! -s "$NVM_DIR/nvm.sh" ]; then
                curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
              fi
              . "$NVM_DIR/nvm.sh"
              nvm install 22
              nvm use 22
              # Ensure PATH contains the selected Node bin
              export PATH="$(dirname "$(nvm which 22)"):$PATH"
            else
              echo "[remote] Node/npm already present"
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              echo "[remote] Installing pm2 globally"
              npm i -g pm2
            fi

            echo "[remote] Versions:"; node -v; npm -v; pm2 -v || true

            npm i
            npm run build
            pm2 restart all || true
            pm2 save || true

