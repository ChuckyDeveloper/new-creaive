name: DEPLOY TO CREAIVE SERVER

on:
  push:
    branches: ["production"]

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: production

    env:
      # Vars (non-secret)
      APP_DIR: ${{ vars.APP_DIR }}
      BRANCH: ${{ vars.BRANCH }}
      REPO_SSH_URL: ${{ vars.REPO_SSH_URL }}
      SITE_URL: ${{ vars.SITE_URL }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

      # Secrets presence flags (avoid using secrets directly in if:)
      HAS_SSH_KEY: ${{ secrets.SSH_KEY != '' }}
      HAS_SSH_PASSWORD: ${{ secrets.SSH_PASSWORD != '' }}
      HAS_HOST: ${{ secrets.SSH_HOST != '' }}
      HAS_USER: ${{ secrets.SSH_USER != '' }}
      HAS_PORT: ${{ secrets.SSH_PORT != '' }}

    steps:
      - name: Echo vars (safe)
        shell: bash
        run: |
          echo "APP_DIR=${APP_DIR}"
          echo "BRANCH=${BRANCH}"
          echo "REPO_SSH_URL=${REPO_SSH_URL}"
          echo "SITE_URL=${SITE_URL}"
          echo "NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}"

      - name: Echo secrets presence (do not print values)
        shell: bash
        run: |
          echo "HAS_HOST=${HAS_HOST}"
          echo "HAS_USER=${HAS_USER}"
          echo "HAS_PORT=${HAS_PORT}"
          echo "HAS_SSH_KEY=${HAS_SSH_KEY}"
          echo "HAS_SSH_PASSWORD=${HAS_SSH_PASSWORD}"

      - name: Validate required secrets exist
        shell: bash
        run: |
          set -e
          [ "${HAS_HOST}" = "true" ] || { echo "Missing SSH_HOST secret"; exit 1; }
          [ "${HAS_USER}" = "true" ] || { echo "Missing SSH_USER secret"; exit 1; }
          [ "${HAS_PORT}" = "true" ] || { echo "Missing SSH_PORT secret"; exit 1; }
          if [ "${HAS_SSH_KEY}" != "true" ] && [ "${HAS_SSH_PASSWORD}" != "true" ]; then
            echo "Provide SSH_KEY or SSH_PASSWORD in environment secrets"; exit 1;
          fi

      # - name: Preflight DNS & TCP reachability
      #   shell: bash
      #   run: |
      #     set -e
      #     HOST="${{ secrets.SSH_HOST }}"
      #     PORT="${{ secrets.SSH_PORT }}"
      #     echo "Checking DNS for host..."
      #     if command -v getent >/dev/null 2>&1; then
      #       getent hosts "$HOST" || { echo "DNS resolution failed (getent)"; exit 1; }
      #     else
      #       command -v nslookup >/dev/null 2>&1 && nslookup "$HOST" || { echo "DNS resolution failed (nslookup)"; exit 1; }
      #     fi
